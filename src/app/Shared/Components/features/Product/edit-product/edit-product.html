<div class="main-content-wrapper container">
  <div class="row justify-content-center">
    <div class="col-12 col-xl-11">
      <a
        class="text-decoration-none text-black fw-bold mb-4 d-inline-block" [routerLink]="['/admin/product']"
      
      >
        <i style="cursor: pointer" class="bi bi-arrow-left-circle-fill me-2"></i> BACK TO PRODUCTS
      </a>

      <div class="form-card shadow-lg">
        <div class="form-header">
          <h2 class="mb-0">Edit  PRODUCT</h2>
        </div>

        <div class="form-body p-3 p-md-5">
          <form [formGroup]="editProductForm" (ngSubmit)="onSubmit()">
            <div class="row g-4">
              <div class="col-lg-8">
                <div class="row">
                  <div class="col-md-7 mb-4">
                    <label class="form-label">Product Title</label>
                    <input
                      type="text"
                      class="form-control custom-input"
                      formControlName="productTitle"
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Categories</label>
                    <select class="form-control" multiple formControlName="categories">
                      @for (category of categoriesRespone(); track category.id) {
                        <option [value]="category.id">{{ category.name }}</option>
                      }
                    </select>
                  </div>

                  <div class="col-md-5 mb-4">
                    <label class="form-label">Price ($)</label>
                    <input
                      type="number"
                      class="form-control custom-input"
                      formControlName="price"
                    />
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label">Featured Image URL</label>
                    <div class="input-group">
            
                      <input
                        type="text"
                        class="form-control custom-input"
                        placeholder="Paste URL here..."
                        formControlName="imageUrl"
                      />
                      <a class="btn btn-black-action mt-1" type="button" (click)="openImageSelector()">
                        SELECT <i class="bi bi-upload ms-1"></i>
                      </a>
                    </div>
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label">URL Handle</label>
                    <input
                      type="text"
                      class="form-control custom-input"
                      placeholder="pro-wireless-headphones"
                      formControlName="urlHandle"
                    />
                  </div>
                    <div class="col-12 mb-4">
                    <div class="inventory-container p-4 rounded shadow-sm border bg-white">
                      <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0 text-primary fw-bold">Inventory & Variants</h5>
                        <button type="button" class="btn btn-sm btn-dark px-3" (click)="addVariant()">
                          <i class="bi bi-plus-lg me-1"></i> ADD VARIANT
                        </button>
                      </div>
                      
                      <div formArrayName="variants">
                        <div *ngFor="let variant of variants.controls; let i=index" [formGroupName]="i" class="row g-3 mb-3 align-items-end pb-3 border-bottom border-light">
                          
                          <div class="col-md-4">
                            <label class="small fw-bold">Color</label>
                            <select class="form-select custom-input" formControlName="colorId">
                              <option value="" disabled>Select Color</option>
                              @for (color of colorsResponse(); track color.id) {
                                <option [value]="color.id">{{ color.name }}</option>
                              }
                            </select>
                          </div>

                          <div class="col-md-3">
                            <label class="small fw-bold">Size</label>
                            <select class="form-select custom-input" formControlName="sizeId">
                              <option value="" disabled>Select Size</option>
                              @for (size of sizesResponse(); track size.id) {
                                <option [value]="size.id">{{ size.name }}</option>
                              }
                            </select>
                          </div>

                          <div class="col-md-3">
                            <label class="small fw-bold">Quantity</label>
                            <input type="number" class="form-control custom-input" formControlName="quantity" placeholder="Stock">
                          </div>

                          <div class="col-md-2">
                            <button type="button" class="btn btn-outline-danger w-100" (click)="removeVariant(i)">
                              <i class="bi bi-trash"></i>
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label">Description</label>
                    <textarea
                      class="form-control custom-input"
                      rows="6"
                      placeholder="Enter details..."
                      formControlName="description"
                    ></textarea>
                  </div>
                </div>
              </div>

                           <div class="col-lg-4">
                <div class="preview-sidebar sticky-lg-top">
                  <label class="form-label text-center d-block">Live Preview</label>
                  
                  @if(editProductForm.controls.imageUrl.getRawValue())
                  {

                    <div class="preview-frame-new shadow-sm">
                      <div class="no-image-placeholder">
                        <i class="bi bi-image text-muted display-4"></i>
                        <p class="small text-muted mt-2">No Image Selected</p>
                      </div>
                      <img
                      [src]="editProductForm.controls.imageUrl.getRawValue()"
                      alt="Preview"
                      class="img-fluid main-preview-img"
                      />
                    </div>
                  }

                  <div class="mt-4 d-grid gap-2 d-lg-none">
                    <button type="submit" class="btn btn-register-solid py-3">PUBLISH</button>
                  </div>
                </div>
              </div>



           <div class="col-12 mt-4 d-none d-lg-flex gap-3 border-top pt-4">
                <button type="submit" class="btn btn-register-solid flex-grow-1 py-3">
                  PUBLISH PRODUCT
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>


<app-image-selector></app-image-selector>
