<div class="main-content-wrapper container">
  <div class="row justify-content-center">
    <div class="col-12 col-xl-11">
      <a class="text-decoration-none text-black fw-bold mb-4 d-inline-block" [routerLink]="['/admin/product']">
        <i class="bi bi-arrow-left-circle-fill me-2"></i> BACK TO PRODUCTS
      </a>

      <div class="form-card shadow-lg border-0">
        <div class="form-header bg-dark text-white p-3 rounded-top">
          <h2 class="mb-0 fs-4 text-uppercase fw-900">EDIT PRODUCT</h2>
        </div>

        <div class="form-body p-3 p-md-5 bg-white rounded-bottom">
          <form [formGroup]="editProductForm" (ngSubmit)="onSubmit()">
            <div class="row g-4">
              <div class="col-lg-8">
                <div class="row">
                  <div class="col-md-7 mb-4">
                    <label class="form-label fw-bold">Product Title</label>
                    <input type="text" class="form-control custom-input" formControlName="title" />
                  </div>

                  <div class="col-md-5 mb-4">
                    <label class="form-label fw-bold">Price ($)</label>
                    <input type="number" class="form-control custom-input" formControlName="price" />
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label fw-bold">Categories</label>
                    <select class="form-control custom-input" multiple formControlName="categories">
                      @for (category of categoriesRespone(); track category.id) {
                        <option [value]="category.id">{{ category.name }}</option>
                      }
                    </select>
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label fw-bold">Featured Image URL</label>
                    <div class="input-group">
                      <input type="text" class="form-control custom-input" formControlName="imageUrl" />
                      <button class="btn btn-dark" type="button" (click)="openImageSelector()">
                        SELECT <i class="bi bi-upload ms-1"></i>
                      </button>
                    </div>
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label fw-bold">URL Handle</label>
                    <input type="text" class="form-control custom-input" formControlName="urlHandle" />
                  </div>

                  <div class="col-12 mb-4">
                    <div class="inventory-container p-4 rounded border bg-light">
                      <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0 text-dark fw-bold text-uppercase small">Inventory & Variants</h5>
                        <button type="button" class="btn btn-sm btn-dark" (click)="addVariant()">
                          <i class="bi bi-plus-lg me-1"></i> ADD VARIANT
                        </button>
                      </div>
                      
                      <div formArrayName="variants">
                        @for (variant of variants.controls; let i=$index; track i) {
                          <div [formGroupName]="i" class="row g-3 mb-3 align-items-end pb-3 border-bottom border-secondary-subtle">
                            <div class="col-md-4">
                              <label class="small fw-bold">Color</label>
                              <select class="form-select custom-input" formControlName="colorId">
                                @for (color of colorsResponse(); track color.id) {
                                  <option [value]="color.id">{{ color.name }}</option>
                                }
                              </select>
                            </div>
                            <div class="col-md-3">
                              <label class="small fw-bold">Size</label>
                              <select class="form-select custom-input" formControlName="sizeId">
                                @for (size of sizesResponse(); track size.id) {
                                  <option [value]="size.id">{{ size.name }}</option>
                                }
                              </select>
                            </div>
                            <div class="col-md-3">
                              <label class="small fw-bold">Qty</label>
                              <input type="number" class="form-control custom-input" formControlName="quantity">
                            </div>
                            <div class="col-md-2">
                              <button type="button" class="btn btn-outline-danger w-100" (click)="removeVariant(i)">
                                <i class="bi bi-trash"></i>
                              </button>
                            </div>
                          </div>
                        }
                      </div>
                    </div>
                  </div>

                  <div class="col-12 mb-4">
                    <label class="form-label fw-bold">Description</label>
                    <textarea class="form-control custom-input" rows="4" formControlName="description"></textarea>
                  </div>
                </div>
              </div>

              <div class="col-lg-4">
                <div class="preview-sidebar sticky-lg-top">
                  <label class="form-label text-center d-block fw-bold text-uppercase small">Live Preview</label>
                  <div class="preview-frame-new shadow-sm bg-white rounded border overflow-hidden">
                    <img [src]="editProductForm.get('imageUrl')?.value" alt="Preview" class="img-fluid" style="width: 100%; height: 250px; object-fit: cover;" />
                    <div class="p-3">
                      <h6 class="fw-bold mb-1">{{ editProductForm.get('title')?.value }}</h6>
                      <p class="text-orange-link fw-bold mb-0">${{ editProductForm.get('price')?.value }}</p>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12 mt-4 d-flex gap-3 border-top pt-4">
                <button type="submit" class="btn btn-register-solid flex-grow-1 py-3 fw-bold" [disabled]="editProductForm.invalid">
                  SAVE CHANGES
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<app-image-selector />
