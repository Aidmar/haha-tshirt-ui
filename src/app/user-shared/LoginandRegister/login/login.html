<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        
        <div class="card auth-card border-0 shadow-lg p-4 p-md-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Welcome Back</h2>
            <p class="text-muted">Log in to your account</p>
          </div>

          <form #loginForm="ngForm" (ngSubmit)="onFormSubmit()">
            
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input 
                  type="email" 
                  name="email"
                  [(ngModel)]="model.email"
                  class="form-control border-start-0 ps-0" 
                  placeholder="name@example.com"
                  required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input 
                  type="password" 
                  name="password"
                  [(ngModel)]="model.password"
                  class="form-control border-start-0 ps-0" 
                  placeholder="••••••••"
                  required>
              </div>
            </div>

            <button 
              type="submit" 
              [disabled]="!loginForm.valid"
              class="btn btn-hero-orange w-100 py-3 fw-bold mb-3 shadow-sm">
              LOG IN
            </button>

            <div class="text-center">
              <p class="small text-muted mb-0">
                Don't have an account? 
                <a [routerLink]="['/register']" class="text-hero-orange fw-bold text-decoration-none">Register here</a>
              </p>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
