<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        
        <div class="card auth-card border-bold p-4 p-md-5">
          <div class="text-center mb-4">
            <h2 class="fw-black mb-1 uppercase">Create Account</h2>
            <p class="text-muted">Your wardrobe upgrade starts here.</p>
          </div>

          <form #form="ngForm" >
            
            <div class="mb-3">
              <label class="form-label fw-bold uppercase small">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-bold border-end-0">
                  <i class="bi bi-person text-muted"></i>
                </span>
                <input 
                  type="text" 
                  name="username"

                  class="form-control border-bold border-start-0 ps-0" 
                  placeholder="Choose a username"
                  required
                  minlength="3">
              </div>
     
                <div class="error-box mt-1">
                  <span>Username is required</span> 
                <span>Must be at least 3 characters</span> 
                </div>
              
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold uppercase small">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-bold border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input 
                  type="email" 
                  name="email"
  
                  class="form-control border-bold border-start-0 ps-0" 
                  placeholder="name@example.com"
                  required
                  email>
              </div>
 
                <div class="error-box mt-1">
               <span>Email is required</span> 
                 <span>Please enter a valid email (@)</span> 
                </div>
              
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold uppercase small">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-bold border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input 
                  type="password" 
                  name="password"
                  class="form-control border-bold border-start-0 ps-0" 
                  placeholder="At least 6 characters"
                  required
                  minlength="6">
              </div>
            
                <div class="error-box mt-1">
                  <span>Password is required</span>
               <span>Password must be 6+ characters</span>
                </div>
         
            </div>

            <button type="submit" [disabled]="!form.valid" class="btn btn-hero-orange w-100 py-3 fw-black mb-3">
              CREATE ACCOUNT
            </button>

            <div class="text-center">
              <p class="small text-muted mb-0">
                Already have an account? 
                <a [routerLink]="['/login']" class="text-hero-orange fw-bold text-decoration-none">Login here</a>
              </p>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
